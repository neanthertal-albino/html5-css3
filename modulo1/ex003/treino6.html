<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentação</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5 podemos utilizar tags para desenvolver o site, algumas estarão aqui em baixo, arraste o mouse sobre os nomes abaixo para verificar quais são</p>
    <ul>
        <li><abbr title="Use a tag &lt;p&gt;">Parágrafos</abbr></li>
        <li><abbr title="Use a tag &lt;h1&gt;">Títulos</abbr></li>
        <li><abbr title="Use a tag &lt;Img&gt;">Imagens</abbr></li>
        <li><abbr title="Use a tag &lt;abbr&gt;">abreviações</abbr></li>
        <li><abbr title="Use a tag &lt;code&gt;">códigos-font</abbr></li>
        <li><abbr title="Use a tag &lt;ol&gt; e um &lt;li&gt; dentro para cada item na lista">listas númeradas</abbr></li>
        <li><abbr title="Use a tag &lt;ul&gt; e um &lt;li&gt; dentro para cada item na lista">lista com marcação</abbr></li>
    </ul>
</body>
</html>
